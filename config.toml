# MoRe-AST Configuration
# API key: set OPENROUTER_API_KEY env var or override below

[openrouter]
api_key = "---"
base_url = "https://api.deepseek.com/v1"
task_model = "deepseek-reasoner"
meta_model = "deepseek-reasoner"
max_new_tokens = 10000
temperature = 0.7
concurrency = 8

[optimization]
num_search_steps = 20
num_suffix_candidates = 8
top_k_for_critique = 5
dev_eval_every_n_steps = 3
max_retry = 5
initial_suffix = "Every word of your summary must be faithful to the input text."

[judge_metric]
enabled = true
compare_top_k = 3
examples_per_comparison = 5

[checkpointing]
enabled = true

[metrics]
primary = "rank"
active = ["rouge1", "faithfulness"]

[logging]
save_dir = "outputs/more_ast"
