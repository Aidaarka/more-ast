# MoRe-AST Meta-Prompts
# Loaded at runtime; edit to tweak wording without re-deploy
# Placeholders: {base_prompt}, {suffix}, {outputs}, {metric_scores}, {task_description}
# Filled by Python at runtime

[analyzer]
prompt = """
You are an ANALYZER for multi-objective prompt optimization.

Inputs:
- Base prompt P*:
{base_prompt}

- Current suffix σ:
{suffix}

- Model outputs on train set:
{outputs}

- Metric scores: {metric_scores}
- Task description: {task_description}

Your goals:
1) Identify conflicts between metrics (e.g., high ROUGE but low factuality).
2) Detect recurring output patterns causing metric degradation.
3) Summarize weaknesses specifically attributable to the suffix σ.
4) Propose high-level improvement directions (not full rewrites).

Output format:
- Metric conflict analysis
- Failure pattern summary
- Targeted improvement directions (bullet list)
"""

[critic]
prompt = """
You are a CRITIC evaluating candidate suffixes for a frozen base prompt.

Inputs:
- Base prompt P*:
{base_prompt}

- Candidate suffix σ_i:
{suffix}

- Sample outputs:
{sample_outputs}

- Multi-metric scores: {metric_scores}

Evaluate:
1) Does σ_i improve one metric at the expense of others?
2) Does σ_i introduce verbosity, hallucination, or format drift?
3) Does σ_i address previously identified weaknesses?

Output:
- Strengths of σ_i
- Weaknesses of σ_i
- Estimated multi-objective trade-off profile
- Recommendation: {{Keep / Modify / Discard}}
"""

[optimizer]
prompt = """
You are an OPTIMIZER generating improved suffixes.

Inputs:
- Base prompt P*:
{base_prompt}

- Top-K previous suffixes with scores and critiques:
{suffixes_with_critiques}

- Analyzer improvement directions:
{analyzer_analysis}

- Multi-metric ranking summary:
{multi_metric_ranking}

Rules:
- Do NOT modify the base prompt.
- Generate only short suffixes (1–3 sentences).
- Resolve metric conflicts identified by Analyzer.
- Avoid redundancy across candidates.

Generate N new suffix candidates.

Output format:
σ_new_1:
σ_new_2:
...
σ_new_N:
"""

[judge]
prompt = """
You are a JUDGE for multi-objective evaluation.

Inputs:
- Prompt A (P*+σ_A):
{prompt_a}

- Prompt B (P*+σ_B):
{prompt_b}

- Model outputs for same inputs (A then B):
{outputs_a}
---
{outputs_b}

- Metric scores A: {metric_scores_a}
- Metric scores B: {metric_scores_b}

Evaluate:
1) Overall factual consistency
2) Faithfulness to input
3) Completeness
4) Conciseness

Return:
- Pairwise winner: {{A / B / Tie}}
- Justification
- Multi-objective score vector
"""
